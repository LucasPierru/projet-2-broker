<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store UI - Orders & Delivery</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Orders & Delivery</h1>
        <p class="subtitle">List customer orders and update delivery status.</p>
        <nav>
          <a href="./index.html">Products</a>
          <a href="./orders.html">Orders & Delivery</a>
          <a href="./logs.html">Logs</a>
        </nav>
      </header>

      <section class="card">
        <div class="row">
          <div class="field">
            <label for="customerId">Customer ID</label>
            <input id="customerId" type="text" value="11111111-1111-1111-1111-111111111111" />
          </div>
          <div class="field" style="max-width: 220px">
            <button id="loadOrdersBtn">Load orders</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Orders</h2>
        <div id="ordersContainer">No orders loaded.</div>
      </section>

      <section class="card">
        <h2>API response</h2>
        <pre id="apiOutput">No action yet.</pre>
      </section>
    </div>

    <script src="./orders.js" type="module"></script>
  </body>
</html>
