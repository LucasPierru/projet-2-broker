<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store UI - Products</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Products & Order</h1>
        <p class="subtitle">Browse catalog products and create an order.</p>
        <nav>
          <a href="./index.html">Products</a>
          <a href="./orders.html">Orders & Delivery</a>
          <a href="./logs.html">Logs</a>
        </nav>
      </header>

      <section class="card">
        <div class="row">
          <div class="field">
            <label for="customerId">Customer ID</label>
            <input id="customerId" type="text" value="11111111-1111-1111-1111-111111111111" />
          </div>
          <div class="field" style="max-width: 200px">
            <button id="refreshProductsBtn" class="secondary">Refresh products</button>
          </div>
        </div>
        <small class="muted"
          >Seed examples: 11111111-1111-1111-1111-111111111111 / 22222222-2222-2222-2222-222222222222</small
        >
      </section>

      <section class="card">
        <h2>Manage product</h2>
        <div class="row">
          <div class="field">
            <label for="editProductId">Existing product (for edit)</label>
            <select id="editProductId">
              <option value="">Select a product</option>
            </select>
          </div>
          <div class="field">
            <label for="productName">Name</label>
            <input id="productName" type="text" placeholder="Mechanical Keyboard" />
          </div>
          <div class="field">
            <label for="productPrice">Price</label>
            <input id="productPrice" type="number" min="0" step="0.01" placeholder="129.99" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="productDescription">Description</label>
            <input id="productDescription" type="text" placeholder="Hot-swappable compact keyboard" />
          </div>
          <div class="field" style="max-width: 200px">
            <label for="productActive">Active</label>
            <select id="productActive">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>
        </div>
        <div class="row">
          <button id="createProductBtn">Create product</button>
          <button id="updateProductBtn" class="secondary">Update product</button>
        </div>
      </section>

      <section class="card">
        <h2>Catalog</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Price</th>
              <th>Description</th>
              <th>Qty</th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </section>

      <section class="card">
        <div class="row">
          <button id="placeOrderBtn">Place order</button>
          <span id="orderSummary"></span>
        </div>
      </section>

      <section class="card">
        <h2>API response</h2>
        <pre id="apiOutput">No action yet.</pre>
      </section>
    </div>

    <script src="./products.js" type="module"></script>
  </body>
</html>
